name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: SnehasishDas30
          outputs: dist/snake.svg

      - name: Commit Snake
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update snake animation"
